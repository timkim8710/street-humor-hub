<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Humor Hub</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
            --accent: #00f2ea; 
            --pink: #ff0050;   
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        /* Main Container */
        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: #000;
            border-left: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        /* Header */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        header span { font-weight: bold; opacity: 0.7; cursor: pointer; }
        header span.active { opacity: 1; border-bottom: 2px solid var(--accent); }

        /* The Feed */
        #feed {
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none; /* Hide scrollbar */
        }
        #feed::-webkit-scrollbar { display: none; }

        .post {
            height: 100%;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Interaction Sidebar */
        .sidebar {
            position: absolute;
            right: 10px;
            bottom: 120px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 5;
        }

        .action-btn {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* Bottom Info */
        .details {
            position: absolute;
            bottom: 30px;
            left: 15px;
            right: 70px;
            z-index: 5;
        }

        .username { font-weight: bold; margin-bottom: 5px; color: var(--accent); }
        .caption { font-size: 0.95rem; line-height: 1.3; }

        /* Upload UI */
        .upload-area {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            text-align: center;
        }

        #upload-btn {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 242, 234, 0.3);
        }

        #status-msg {
            font-size: 0.8rem;
            margin-top: 5px;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <span class="active">Street Humor</span>
        <span>Following</span>
    </header>

    <div id="feed">
        <div class="post">
            <div style="padding: 20px; text-align: center;">
                <h3>Welcome to the Hub!</h3>
                <p>Upload a video to start the street humor vibes.</p>
            </div>
        </div>
    </div>

    <div class="upload-area">
        <input type="file" id="video-input" accept="video/*" style="display: none;">
        <button id="upload-btn" onclick="document.getElementById('video-input').click()">+ POST HUMOR</button>
        <div id="status-msg"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

    // Your actual Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCXArPj4WErtRkb2qfaDueaWZm9tdAbSGI",
        authDomain: "street-humor-hub.firebaseapp.com",
        databaseURL: "https://street-humor-hub-default-rtdb.firebaseio.com",
        projectId: "street-humor-hub",
        storageBucket: "street-humor-hub.firebasestorage.app",
        messagingSenderId: "1010209458338",
        appId: "1:1010209458338:web:9dafc4376bf5129c3ceffb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // 1. Upload Logic
    document.getElementById('video-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const status = document.getElementById('status-msg');
        status.innerText = "Uploading...";

        try {
            const fileName = Date.now() + "_" + file.name;
            const storageRef = ref(storage, 'videos/' + fileName);
            const snapshot = await uploadBytes(storageRef, file);
            const url = await getDownloadURL(snapshot.ref);

            await addDoc(collection(db, "posts"), {
                videoUrl: url,
                caption: "New street humor drop! 😂 #merumaua",
                createdAt: new Date()
            });

            status.innerText = "Success! Scroll down.";
        } catch (err) {
            console.error(err);
            status.innerText = "Error uploading.";
        }
    });

    // 2. Load Feed Logic
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        feed.innerHTML = ''; // Clear for fresh load
        
        snapshot.forEach((doc) => {
            const data = doc.data();
            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `
                <video src="${data.videoUrl}" loop muted playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="sidebar">
                    <div class="action-btn">❤️</div>
                    <div class="action-btn">💬</div>
                    <div class="action-btn">✈️</div>
                </div>
                <div class="details">
                    <div class="username">@street_humor</div>
                    <div class="caption">${data.caption}</div>
                </div>
            `;
            feed.appendChild(post);
            
            // Auto-play the first video found
            const firstVideo = post.querySelector('video');
            if (feed.children.length === 1) firstVideo.play().catch(() => {});
        });
    });
</script>

</body>
</html>
