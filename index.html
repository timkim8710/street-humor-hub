<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Humor Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ea">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1169/1169944.png">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ea; 
            --pink: #ff0050;   
            --ig-dark: #121212;
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
            height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        /* Feed Snapping */
        #feed {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        #feed::-webkit-scrollbar { display: none; }

        .post {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: var(--ig-dark);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Overlays */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 45px 0 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        .sidebar {
            position: absolute;
            right: 12px;
            bottom: 160px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
            align-items: center;
        }

        .action-btn {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        .details {
            position: absolute;
            bottom: 100px;
            left: 15px;
            right: 80px;
            z-index: 5;
        }

        .username { font-weight: 700; color: var(--accent); }

        /* Bottom Nav */
        .bottom-nav {
            height: 75px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            z-index: 20;
        }

        .center-post {
            background: linear-gradient(to right, var(--accent), var(--pink));
            width: 42px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 900;
        }

        /* Editor Overlay */
        #editor {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .music-chip {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 10px 20px;
            border-radius: 20px;
            margin: 5px;
            cursor: pointer;
        }

        .music-chip.active { background: var(--accent); color: #000; }

    </style>
</head>
<body>

<div id="app">
    <header>
        <span class="active">Humor</span>
        <span style="opacity: 0.5;">Fresh</span>
    </header>

    <div id="feed">
        <div class="post">
            <div style="padding: 50px; text-align: center; margin-top: 50%;">
                <h2>Street Humor Hub</h2>
                <button id="login-btn" style="padding: 10px 20px; border-radius: 20px; background: #fff; color: #000; border: none; font-weight: bold;">Sign In</button>
            </div>
        </div>
    </div>

    <div id="editor">
        <h3 style="color: var(--accent);">Edit Vibe</h3>
        <video id="preview" style="width: 200px; height: 320px; border-radius: 12px; object-fit: cover;" muted autoplay loop></video>
        <div style="display: flex; flex-wrap: wrap; justify-content: center; margin: 20px 0;">
            <div class="music-chip active" onclick="setMusic('None', this)">No Music</div>
            <div class="music-chip" onclick="setMusic('Meru Drill', this)">🔥 Meru Drill</div>
            <div class="music-chip" onclick="setMusic('Maua Flow', this)">🎤 Maua Flow</div>
        </div>
        <button id="post-now" class="center-post" style="width: 150px; height: 45px; border-radius: 25px;">POST NOW</button>
        <p onclick="document.getElementById('editor').style.display='none'" style="margin-top: 15px; font-size: 0.9rem; opacity: 0.7;">Cancel</p>
    </div>

    <nav class="bottom-nav">
        <div>🏠</div>
        <div id="post-trigger" class="center-post">+</div>
        <div>👤</div>
    </nav>

    <input type="file" id="video-input" accept="video/*" style="display: none;">
    <div id="status-msg" style="position: absolute; bottom: 85px; width: 100%; text-align: center; font-size: 0.8rem; color: var(--accent);"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCXArPj4WErtRkb2qfaDueaWZm9tdAbSGI",
        authDomain: "street-humor-hub.firebaseapp.com",
        projectId: "street-humor-hub",
        storageBucket: "street-humor-hub.firebasestorage.app",
        messagingSenderId: "1010209458338",
        appId: "1:1010209458338:web:9dafc4376bf5129c3ceffb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let selectedFile = null;
    let selectedMusic = "None";

    // AUTH
    const loginBtn = document.getElementById('login-btn');
    loginBtn.onclick = () => signInWithPopup(auth, provider);
    onAuthStateChanged(auth, (user) => { currentUser = user; if(user) loginBtn.style.display='none'; });

    // EDITOR LOGIC
    const trigger = document.getElementById('post-trigger');
    const input = document.getElementById('video-input');
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');

    trigger.onclick = () => { if(!currentUser) signInWithPopup(auth, provider); else input.click(); };

    input.onchange = (e) => {
        selectedFile = e.target.files[0];
        if(!selectedFile) return;
        preview.src = URL.createObjectURL(selectedFile);
        editor.style.display = 'flex';
    };

    window.setMusic = (name, el) => {
        selectedMusic = name;
        document.querySelectorAll('.music-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    };

    // FINAL UPLOAD
    document.getElementById('post-now').onclick = async () => {
        editor.style.display = 'none';
        const status = document.getElementById('status-msg');
        status.innerText = "Uploading vibe...";
        try {
            const path = `videos/${Date.now()}_${selectedFile.name}`;
            const sRef = ref(storage, path);
            const snap = await uploadBytes(sRef, selectedFile);
            const url = await getDownloadURL(snap.ref);

            await addDoc(collection(db, "posts"), {
                videoUrl: url,
                music: selectedMusic,
                username: currentUser.displayName,
                userImg: currentUser.photoURL,
                createdAt: new Date()
            });
            status.innerText = "✅ Posted!";
        } catch (err) { status.innerText = "❌ Failed."; }
    };

    // FEED
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        if(snapshot.empty) return;
        feed.innerHTML = '';
        snapshot.forEach((doc) => {
            const d = doc.data();
            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `
                <video src="${d.videoUrl}" loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="sidebar">
                    <img src="${d.userImg}" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--accent);">
                    <div class="action-btn">❤️</div>
                    <div class="action-btn">💬</div>
                </div>
                <div class="details">
                    <div class="username">${d.username}</div>
                    <div style="font-size:0.8rem; opacity:0.8;">♫ ${d.music || 'Original Audio'}</div>
                </div>`;
            feed.appendChild(post);
        });
    });

    if ('serviceWorker' in navigator) { window.addEventListener('load', () => navigator.serviceWorker.register('sw.js')); }
</script>
</body>
</html>
