<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Street Humor Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ea">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1169/1169944.png">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --border: rgba(255, 255, 255, 0.1);
            --accent: #00f2ea; 
            --pink: #ff0050;   
            --ig-dark: #121212;
        }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            overflow: hidden;
            height: 100vh;
        }

        #app {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
        }

        /* TikTok Style Snapping Feed */
        #feed {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
        }
        #feed::-webkit-scrollbar { display: none; }

        .post {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            position: relative;
            background: var(--ig-dark);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Instagram-Style Header */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 45px 0 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
        }

        header span { font-weight: 600; font-size: 0.9rem; opacity: 0.6; cursor: pointer; }
        header span.active { opacity: 1; border-bottom: 2px solid #fff; }

        /* TikTok Sidebar Actions */
        .sidebar {
            position: absolute;
            right: 12px;
            bottom: 160px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
            align-items: center;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: #333;
        }

        .action-btn {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
        }

        /* IG-Style Details */
        .details {
            position: absolute;
            bottom: 100px;
            left: 15px;
            right: 80px;
            z-index: 5;
        }

        .username { font-weight: 700; margin-bottom: 5px; font-size: 1rem; }
        .caption { font-size: 0.9rem; line-height: 1.4; color: #eee; }

        /* Hybrid Bottom Nav */
        .bottom-nav {
            height: 75px;
            background: #000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid var(--border);
            z-index: 20;
        }

        .nav-item { font-size: 1.4rem; cursor: pointer; opacity: 0.8; }
        .center-post {
            background: linear-gradient(to right, var(--accent) 15%, var(--pink) 85%);
            width: 42px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 900;
            font-size: 1.2rem;
        }

        #status-msg {
            position: absolute;
            bottom: 85px;
            width: 100%;
            text-align: center;
            font-size: 0.75rem;
            color: var(--accent);
            z-index: 30;
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <span class="active">Trending</span>
        <span>Local</span>
    </header>

    <div id="feed">
        <div class="post">
            <div style="padding: 50px; text-align: center; margin-top: 50%;">
                <h2>Street Humor Hub</h2>
                <p>Sign in with Google to start viewing and posting!</p>
                <button id="login-btn" style="padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer;">Sign In</button>
            </div>
        </div>
    </div>

    <div id="status-msg"></div>

    <nav class="bottom-nav">
        <div class="nav-item">🏠</div>
        <div class="nav-item">🔍</div>
        <div class="center-post" id="post-trigger">+</div>
        <div class="nav-item">💬</div>
        <div class="nav-item">👤</div>
    </nav>

    <input type="file" id="video-input" accept="video/*" style="display: none;">
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Your Config
    const firebaseConfig = {
        apiKey: "AIzaSyCXArPj4WErtRkb2qfaDueaWZm9tdAbSGI",
        authDomain: "street-humor-hub.firebaseapp.com",
        projectId: "street-humor-hub",
        storageBucket: "street-humor-hub.firebasestorage.app",
        messagingSenderId: "1010209458338",
        appId: "1:1010209458338:web:9dafc4376bf5129c3ceffb"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;

    // --- AUTH ---
    const loginBtn = document.getElementById('login-btn');
    if(loginBtn) loginBtn.onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user && loginBtn) loginBtn.style.display = 'none';
    });

    // --- UPLOAD ---
    const trigger = document.getElementById('post-trigger');
    const input = document.getElementById('video-input');
    const status = document.getElementById('status-msg');

    trigger.onclick = () => {
        if(!currentUser) { signInWithPopup(auth, provider); }
        else { input.click(); }
    };

    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        status.innerText = "🚀 Uploading humor...";
        try {
            const fileName = `videos/${Date.now()}_${file.name}`;
            const sRef = ref(storage, fileName);
            const snap = await uploadBytes(sRef, file);
            const url = await getDownloadURL(snap.ref);

            await addDoc(collection(db, "posts"), {
                videoUrl: url,
                caption: "New street drop! 😂",
                username: currentUser.displayName,
                userImg: currentUser.photoURL,
                createdAt: new Date()
            });
            status.innerText = "✅ Live!";
            setTimeout(() => status.innerText = "", 3000);
        } catch (err) {
            status.innerText = "❌ Error uploading.";
        }
    };

    // --- FEED ---
    const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snapshot) => {
        const feed = document.getElementById('feed');
        if (snapshot.empty) return;
        feed.innerHTML = '';
        snapshot.forEach((doc) => {
            const data = doc.data();
            const post = document.createElement('div');
            post.className = 'post';
            post.innerHTML = `
                <video src="${data.videoUrl}" loop playsinline onclick="this.paused ? this.play() : this.pause()"></video>
                <div class="sidebar">
                    <img src="${data.userImg || ''}" class="user-avatar">
                    <div class="action-btn">❤️</div>
                    <div class="action-btn">💬</div>
                    <div class="action-btn">✈️</div>
                </div>
                <div class="details">
                    <div class="username">${data.username}</div>
                    <div class="caption">${data.caption}</div>
                </div>
            `;
            feed.appendChild(post);
        });
    });

    // --- PWA ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
</script>
</body>
</html>
